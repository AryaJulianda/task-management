services:
  php:
    container_name: task_management_web
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped

    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini
      - storage-data:/var/www/storage
      - cache-data:/var/www/bootstrap/cache
    working_dir: /var/www
    depends_on:
      - postgres

    networks:
      - app

  nginx:
    image: nginx:alpine
    container_name: task_management_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - storage-data:/var/www/storage
      - cache-data:/var/www/bootstrap/cache
    depends_on:
      - php
    networks:
      - app

  postgres:
    image: postgres:15
    container_name: task_management_db
    environment:
      POSTGRES_DB: task_management
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app

volumes:
  pgdata:
  storage-data:
  cache-data:

networks:
  app:
    driver: bridge
